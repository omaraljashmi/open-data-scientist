name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.lock
          python -m pip check
      - name: Compile source
        run: python -m compileall -q app.py Home.py app_shared.py ods pages tests scripts
      - name: Run test suite
        run: python -m unittest discover -s tests -v
      - name: Run multi-format validation matrix
        run: python -m scripts.validation_matrix
      - name: Run release performance check
        run: python -m scripts.benchmark --rows 25000 --max-seconds 20

  docker:
    name: Docker smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build --tag open-data-scientist:ci .
      - name: Start and verify app
        shell: bash
        run: |
          set -Eeuo pipefail

          docker run --detach --name ods-ci --publish 8501:8501 open-data-scientist:ci

          cleanup() {
            status=$?
            if (( status != 0 )); then
              echo "::group::Container logs"
              docker logs ods-ci || true
              echo "::endgroup::"
            fi
            docker rm --force ods-ci >/dev/null 2>&1 || true
            exit "$status"
          }
          trap cleanup EXIT

          curl \
            --fail \
            --silent \
            --show-error \
            --output /dev/null \
            --connect-timeout 2 \
            --max-time 5 \
            --retry 30 \
            --retry-delay 1 \
            --retry-max-time 45 \
            --retry-connrefused \
            --retry-all-errors \
            http://127.0.0.1:8501/_stcore/health
          echo "Streamlit health check passed."
